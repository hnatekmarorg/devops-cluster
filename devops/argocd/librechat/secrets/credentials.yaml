apiVersion: v1
kind: Secret
metadata:
  name: librechat-credentials
  namespace: librechat
type: Opaque
stringData:
  # Generate these using: https://www.librechat.ai/toolkit/creds_generator
  CREDS_KEY: "<32+ char hex string - generate>"
  CREDS_IV: "<16 char hex string - generate>"
  JWT_SECRET: "<secure random string - generate>"
  JWT_REFRESH_SECRET: "<secure random string - generate>"
  MEILI_MASTER_KEY: "<secure random string - generate>"
  MONGO_ROOT_PASSWORD: "<secure password - generate>"
  REDIS_PASSWORD: "<secure password - generate>"
  # AI Provider API Keys (add as needed)
  OPENAI_API_KEY: "<your-openai-api-key>"
  ANTHROPIC_API_KEY: "<your-anthropic-api-key>"
