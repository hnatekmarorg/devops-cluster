# Namespace
namespace: librechat

# Replicas & Resources (reduced since no GPU/local models)
replicaCount: 2
resources:
  limits:
    cpu: 500m
    memory: 1Gi
  requests:
    cpu: 250m
    memory: 512Mi

# Autoscaling
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

# Ingress (following AGENTS.md conventions)
ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-cloudflare
    nginx.ingress.kubernetes.io/rewrite-target: /
  hosts:
    - host: librechat.hnatekmar.dev
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: librechat-tls
      hosts:
        - librechat.hnatekmar.dev

# Service
service:
  type: ClusterIP
  port: 3080
  targetPort: 3080

# MongoDB (using NFS for shared storage per AGENTS.md)
# Note: PVC annotations for deterministic NFS paths
mongodb:
  enabled: true
  auth:
    enabled: true
    existingSecret: librechat-mongodb
  persistence:
    enabled: true
    storageClass: nfs-client
    size: 10Gi
    annotations:
      nfs.io/storage-path: "librechat-mongodb"  # Deterministic path on NAS

# Meilisearch (required for search, using NFS)
meilisearch:
  enabled: true
  auth:
    existingMasterKeySecret: librechat-credentials
  persistence:
    enabled: true
    storageClass: nfs-client
    size: 5Gi
    annotations:
      nfs.io/storage-path: "librechat-meilisearch"  # Deterministic path on NAS

# Redis (for caching across replicas)
redis:
  enabled: true
  architecture: standalone
  auth:
    enabled: true
    existingSecret: librechat-redis

# Image volume for uploads (using NFS for shared access)
imageVolume:
  enabled: true
  size: 20G
  storageClass: nfs-client
  annotations:
    nfs.io/storage-path: "librechat-uploads"  # Deterministic path on NAS
